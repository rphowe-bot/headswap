<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HeadSwap</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#05030a;
  color:white;
}

/* HERO */
.scene {
  height:420px;
  position:relative;
  background: radial-gradient(circle,#140a1f,#06030a);
  overflow:hidden;
}

.target {
  position:absolute;
  width:200px;
  height:260px;
  border:2px dashed rgba(255,255,255,.4);
  border-radius:50%;
}

.target.left {
  left:15%;
  top:60px;
  border-color:#16ddff;
  box-shadow:0 0 20px #16ddff;
}

.target.right {
  right:15%;
  top:60px;
  border-color:#ff2fa8;
  box-shadow:0 0 20px #ff2fa8;
}

.target span {
  position:absolute;
  bottom:-30px;
  left:50%;
  transform:translateX(-50%);
  font-size:12px;
}

/* BOXES */
.container {
  padding:20px;
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:10px;
}

.card {
  border:1px solid #333;
  padding:15px;
  border-radius:10px;
  background:#0c0714;
}

.active {border-color:#16ddff;}
.complete {border-color:#39ea91;}

button {
  width:100%;
  padding:12px;
  background:#ff2fa8;
  border:none;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

button:disabled {
  opacity:.4;
}

/* FACE BOXES */
.faceBox {
  position:absolute;
  border:2px solid #16ddff;
  cursor:pointer;
}

.faceBox.selected1 {border-color:#16ddff;}
.faceBox.selected2 {border-color:#ff2fa8;}

</style>
</head>

<body>

<div class="scene" id="scene">
  <div class="target left"><span>Face 1</span></div>
  <div class="target right"><span>Face 2</span></div>

  <img id="frame" style="display:none;width:100%;">
  <div id="overlay"></div>
</div>

<div class="container">

<div class="card active" id="stage1">
<h3>1 Upload Video</h3>
<input type="file" id="video">
</div>

<div class="card" id="stage2">
<h3>2 Upload Face</h3>
<input type="file" id="face1">
<input type="file" id="face2">
</div>

<div class="card" id="stage3">
<h3>3 Select Target</h3>
<select id="target1"></select>
<select id="target2"></select>
</div>

<div class="card" id="stage4">
<h3>4 Generate</h3>
<button id="generate" disabled>Generate</button>
</div>

<div class="card" id="stage5">
<h3>Result</h3>
<video id="result" controls></video>
</div>

</div>

<script>

let faces=[]
let selected1=null
let selected2=null

const frame=document.getElementById("frame")
const overlay=document.getElementById("overlay")

document.getElementById("video").onchange=update
document.getElementById("face1").onchange=update

function update(){
  if(video.files[0] && face1.files[0]){
    analyze()
  }
}

async function analyze(){

  const fd=new FormData()
  fd.append("video",video.files[0])
  fd.append("face1",face1.files[0])

  if(face2.files[0]) fd.append("face2",face2.files[0])

  const res=await fetch("/analyze",{method:"POST",body:fd})
  const data=await res.json()

  faces=data.faces
  frame.src=data.first_frame_url
  frame.style.display="block"

  populate()
  draw()

  document.getElementById("generate").disabled=false
}

function populate(){
  target1.innerHTML=""
  target2.innerHTML=""

  faces.forEach(f=>{
    let o=document.createElement("option")
    o.value=f.index
    o.textContent="Face "+f.index
    target1.appendChild(o)

    let o2=o.cloneNode(true)
    target2.appendChild(o2)
  })

  selected1=faces[0].index
  selected2=faces[1]?.index
}

function draw(){
  overlay.innerHTML=""

  faces.forEach(f=>{
    let div=document.createElement("div")
    div.className="faceBox"
    div.style.left=f.x+"px"
    div.style.top=f.y+"px"
    div.style.width=f.w+"px"
    div.style.height=f.h+"px"

    div.onclick=()=>{
      selected1=f.index
      draw()
    }

    if(selected1==f.index) div.classList.add("selected1")

    overlay.appendChild(div)
  })
}

generate.onclick=async()=>{
  const res=await fetch("/generate",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      target1:selected1,
      target2:selected2
    })
  })

  const data=await res.json()
  result.src=data.output_url
}

</script>

</body>
  <div style="
  padding:20px;
  font-size:24px;
  font-weight:bold;
  color:#ff2fa8;
  letter-spacing:1px;
">
  HEAD<span style="color:#16ddff;">SWAP</span>
</div>
</html>
