<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HeadSwap</title>

<style>
* { box-sizing: border-box; }

body {
  margin:0;
  font-family: Arial;
  background:#05030a;
  color:white;
}

.brand {
  padding:20px;
  font-size:26px;
  font-weight:900;
}
.brand span:nth-child(1){color:#ff2fa8;}
.brand span:nth-child(2){color:#16ddff;}

/* HERO */
.scene {
  height:420px;
  position:relative;
  background: radial-gradient(circle,#140a1f,#06030a);
  overflow:hidden;
}

.target {
  position:absolute;
  width:200px;
  height:260px;
  border:2px dashed rgba(255,255,255,.4);
  border-radius:50%;
}

.target.left {
  left:15%;
  top:60px;
  border-color:#16ddff;
  box-shadow:0 0 20px #16ddff;
}

.target.right {
  right:15%;
  top:60px;
  border-color:#ff2fa8;
  box-shadow:0 0 20px #ff2fa8;
}

.frameWrap {
  position:absolute;
  inset:0;
  display:none;
}

#frame {
  width:100%;
  height:100%;
  object-fit:contain;
  user-select:none;
  -webkit-user-drag:none;
  pointer-events:none;
}

#overlay {
  position:absolute;
  inset:0;
  pointer-events:none;
}

/* UI */
.container {
  padding:20px;
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:10px;
}

.card {
  background:#0c0714;
  padding:15px;
  border-radius:10px;
  border:1px solid #333;
}

.active { border-color:#16ddff; }
.complete { border-color:#39ea91; }

button {
  width:100%;
  padding:12px;
  background:#ff2fa8;
  border:none;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

button:disabled { opacity:.4; }

#status {
  padding:10px 20px;
  color:#aaa;
}

/* FACE BOX */
.faceBox {
  position:absolute;
  border:2px solid #16ddff;
  cursor:move;
  pointer-events:auto;
  user-select:none;
}

.faceBox.selected1 { border-color:#16ddff; }
.faceBox.selected2 { border-color:#ff2fa8; }

.faceTag {
  position:absolute;
  top:-10px;
  left:-10px;
  width:24px;
  height:24px;
  border-radius:50%;
  background:#16ddff;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:12px;
}
</style>
</head>

<body>

<div class="brand">
  <span>HEAD</span><span>SWAP</span>
</div>

<div class="scene">
  <div class="target left"></div>
  <div class="target right"></div>

  <div class="frameWrap" id="frameWrap">
    <img id="frame">
    <div id="overlay"></div>
  </div>
</div>

<div id="status">Upload video + face</div>

<div class="container">

<div class="card active">
<h3>1 Upload Video</h3>
<input type="file" id="video">
</div>

<div class="card">
<h3>2 Upload Face</h3>
<input type="file" id="face1">
<input type="file" id="face2">
</div>

<div class="card">
<h3>3 Select</h3>
<select id="target1"></select>
<select id="target2"></select>
</div>

<div class="card">
<h3>4 Generate</h3>
<button id="analyze">Analyze</button>
<button id="generate">Generate</button>
</div>

<div class="card">
<h3>Result</h3>
<video id="result" controls></video>
</div>

</div>

<script>
let faces=[]
let selected1=null
let selected2=null
let sessionId=null

const frame=document.getElementById("frame")
const overlay=document.getElementById("overlay")
const frameWrap=document.getElementById("frameWrap")

analyze.onclick=async()=>{
  const fd=new FormData()
  fd.append("video",video.files[0])
  fd.append("face1",face1.files[0])
  if(face2.files[0]) fd.append("face2",face2.files[0])

  const res=await fetch("/analyze",{method:"POST",body:fd})
  const data=await res.json()

  sessionId=data.session_id
  faces=data.faces

  frame.src=data.first_frame_url
  frameWrap.style.display="block"

  populate()
  draw()
}

function populate(){
  target1.innerHTML=""
  target2.innerHTML=""

  faces.forEach(f=>{
    let o=document.createElement("option")
    o.value=f.index
    o.textContent="Face "+f.index
    target1.appendChild(o)
    target2.appendChild(o.cloneNode(true))
  })

  selected1=faces[0]?.index
  selected2=faces[1]?.index
}

function draw(){
  overlay.innerHTML=""

  faces.forEach(f=>{
    let div=document.createElement("div")
    div.className="faceBox"

    div.style.left=f.x+"px"
    div.style.top=f.y+"px"
    div.style.width=f.w+"px"
    div.style.height=f.h+"px"

    let dragging=false,ox,oy

    div.onmousedown=(e)=>{
      e.preventDefault()
      dragging=true
      ox=e.clientX-div.offsetLeft
      oy=e.clientY-div.offsetTop
    }

    document.onmousemove=(e)=>{
      if(!dragging)return
      div.style.left=(e.clientX-ox)+"px"
      div.style.top=(e.clientY-oy)+"px"
    }

    document.onmouseup=()=>dragging=false

    div.onclick=()=>{
      selected1=f.index
      draw()
    }

    overlay.appendChild(div)
  })
}

generate.onclick=async()=>{
  const res=await fetch("/generate",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      session_id:sessionId,
      target1:selected1,
      target2:selected2
    })
  })

  const data=await res.json()
  result.src=data.output_url
}
</script>

</body>
</html>
