<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>HeadSwap</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#05030a;
  color:white;
}

.brand{
  padding:20px;
  font-size:26px;
  font-weight:900;
}
.brand span:nth-child(1){color:#ff2fa8;}
.brand span:nth-child(2){color:#16ddff;}

.scene{
  height:420px;
  position:relative;
  background:#06030a;
  overflow:hidden;
}

.frameWrap{
  position:absolute;
  inset:0;
  display:none;
}

#frame{
  width:100%;
  height:100%;
  object-fit:contain;
  pointer-events:none;
  user-select:none;
  -webkit-user-drag:none;
}

#overlay{
  position:absolute;
  inset:0;
}

.container{
  padding:20px;
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:10px;
}

.card{
  background:#0c0714;
  padding:15px;
  border-radius:10px;
  border:1px solid #333;
}

button{
  width:100%;
  padding:10px;
  background:#ff2fa8;
  border:none;
  color:white;
  cursor:pointer;
}

.faceBox{
  position:absolute;
  border:2px solid #16ddff;
  cursor:move;
}

.faceBox.selected{
  border-color:#ff2fa8;
}
</style>
</head>

<body>

<div class="brand">
  <span>HEAD</span><span>SWAP</span>
</div>

<div class="scene">
  <div class="frameWrap" id="frameWrap">
    <img id="frame">
    <div id="overlay"></div>
  </div>
</div>

<div class="container">

<div class="card">
<input type="file" id="video">
<input type="file" id="face1">
<button onclick="analyze()">Analyze</button>
</div>

<div class="card">
<button onclick="generate()">Generate</button>
</div>

</div>

<script>

let faces=[]
let manualBoxes={}
let selected=null
let sessionId=null

function analyze(){
  const fd=new FormData()
  fd.append("video",video.files[0])
  fd.append("face1",face1.files[0])

  fetch("/analyze",{method:"POST",body:fd})
  .then(r=>r.json())
  .then(data=>{
    sessionId=data.session_id
    faces=data.faces

    frame.src=data.first_frame_url
    frameWrap.style.display="block"

    draw()
  })
}

function draw(){
  overlay.innerHTML=""

  faces.forEach(f=>{

    let box = manualBoxes[f.index] || {
      x:f.x,
      y:f.y,
      w:f.w,
      h:f.h
    }

    let div=document.createElement("div")
    div.className="faceBox"

    div.style.left=box.x+"px"
    div.style.top=box.y+"px"
    div.style.width=box.w+"px"
    div.style.height=box.h+"px"

    if(selected==f.index) div.classList.add("selected")

    let dragging=false
    let startX,startY,origX,origY

    div.onmousedown=(e)=>{
      e.preventDefault()

      dragging=true
      startX=e.clientX
      startY=e.clientY
      origX=box.x
      origY=box.y

      document.onmousemove=(ev)=>{
        if(!dragging) return

        let nx=origX+(ev.clientX-startX)
        let ny=origY+(ev.clientY-startY)

        div.style.left=nx+"px"
        div.style.top=ny+"px"

        manualBoxes[f.index]={
          x:nx,
          y:ny,
          w:box.w,
          h:box.h
        }
      }

      document.onmouseup=()=>{
        dragging=false
      }
    }

    div.onclick=()=>{
      selected=f.index
      draw()
    }

    overlay.appendChild(div)
  })
}

function generate(){
  fetch("/generate",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      session_id:sessionId,
      target1:selected
    })
  })
  .then(r=>r.json())
  .then(d=>{
    alert("done")
  })
}

</script>

</body>
</html>
