<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HeadSwap</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #05060a;
  color: white;
}

.wrap {
  max-width: 1200px;
  margin: auto;
  padding: 30px;
}

/* HEADER */
h1 {
  font-size: 52px;
  margin: 0;
  letter-spacing: -2px;
}

.sub {
  color: rgba(255,255,255,.6);
  margin-top: 10px;
  margin-bottom: 30px;
  max-width: 600px;
}

/* LAYOUT */
.grid {
  display: grid;
  grid-template-columns: 420px 1fr;
  gap: 20px;
}

/* PANEL */
.card {
  background: rgba(255,255,255,.04);
  border: 1px solid rgba(255,255,255,.08);
  border-radius: 20px;
  padding: 20px;
}

/* INPUTS */
.uploadBox {
  border: 1px solid rgba(255,255,255,.1);
  border-radius: 14px;
  padding: 14px;
  margin-bottom: 12px;
  cursor: pointer;
}

.uploadBox input { display:none; }

button {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: none;
  font-weight: bold;
  cursor: pointer;
  background: white;
  color: black;
}

button:disabled { opacity: .4; }

.status {
  margin: 12px 0;
  font-size: 14px;
  color: rgba(255,255,255,.7);
}

/* PREVIEW */
.previewWrapper {
  position: relative;
  width: 100%;
  border-radius: 18px;
  overflow: hidden;
  background: black;
}

.previewWrapper img {
  width: 100%;
}

/* FACE BOXES */
.faceBox {
  position: absolute;
  border: 2px solid #3b82f6;
  border-radius: 10px;
  cursor: pointer;
}

.faceBox.selected1 {
  border: 3px solid #22c55e;
}

.faceBox.selected2 {
  border: 3px solid #a855f7;
}

.faceTag {
  position: absolute;
  top: -24px;
  left: 0;
  font-size: 12px;
  background: black;
  padding: 3px 6px;
  border-radius: 6px;
}

/* MODES */
.modeButtons {
  display: flex;
  gap: 10px;
  margin-bottom: 12px;
}

.modeBtn {
  flex:1;
  padding:10px;
  border-radius:10px;
  background: rgba(255,255,255,.1);
}

.modeBtn.active {
  background: #22c55e;
  color: black;
}

.modeBtn.purple.active {
  background: #a855f7;
  color: white;
}

video {
  width:100%;
  margin-top:15px;
}
</style>
</head>

<body>

<div class="wrap">

<h1>HeadSwap</h1>
<p class="sub">
Put your face into the scene. Upload a clip, click the character, and generate a tracked video.
</p>

<div class="grid">

<!-- LEFT PANEL -->
<div class="card">

<form id="uploadForm">

<label class="uploadBox">
<input type="file" id="video" required>
Upload Video
</label>

<label class="uploadBox">
<input type="file" id="face1" required>
Upload Face 1
</label>

<label class="uploadBox">
<input type="file" id="face2">
Upload Face 2 (optional)
</label>

<div class="status" id="status">Upload files to begin</div>

<button id="analyzeBtn" disabled>Analyze</button>

</form>

<div id="controls" style="display:none;">

<div class="modeButtons">
<button id="mode1" class="modeBtn active">Face 1</button>
<button id="mode2" class="modeBtn purple">Face 2</button>
</div>

<button id="generateBtn">Generate Video</button>

</div>

</div>

<!-- RIGHT PANEL -->
<div class="card">

<div class="previewWrapper">
<img id="frame">
<div id="overlay"></div>
</div>

<video id="videoOut" controls></video>

</div>

</div>
</div>

<script>
let faces = [];
let selectedMode = 1;
let f1 = null;
let f2 = null;

const overlay = document.getElementById("overlay");
const frame = document.getElementById("frame");

document.getElementById("mode1").onclick = () => {
  selectedMode = 1;
  setModeUI();
};

document.getElementById("mode2").onclick = () => {
  selectedMode = 2;
  setModeUI();
};

function setModeUI() {
  document.getElementById("mode1").classList.toggle("active", selectedMode === 1);
  document.getElementById("mode2").classList.toggle("active", selectedMode === 2);
}

function drawBoxes() {
  overlay.innerHTML = "";

  faces.forEach(face => {
    const box = document.createElement("div");
    box.className = "faceBox";

    box.style.left = face.x + "px";
    box.style.top = face.y + "px";
    box.style.width = face.w + "px";
    box.style.height = face.h + "px";

    if (f1 === face.index) box.classList.add("selected1");
    if (f2 === face.index) box.classList.add("selected2");

    const tag = document.createElement("div");
    tag.className = "faceTag";
    tag.innerText = face.index;

    box.appendChild(tag);

    box.onclick = () => {
      if (selectedMode === 1) f1 = face.index;
      else f2 = face.index;

      drawBoxes();
    };

    overlay.appendChild(box);
  });
}

document.getElementById("uploadForm").onsubmit = async (e) => {
  e.preventDefault();

  const fd = new FormData();
  fd.append("video", video.files[0]);
  fd.append("face1", face1.files[0]);
  if (face2.files[0]) fd.append("face2", face2.files[0]);

  const res = await fetch("/analyze", { method: "POST", body: fd });
  const data = await res.json();

  frame.src = data.first_frame_url;
  faces = data.faces;

  document.getElementById("controls").style.display = "block";

  drawBoxes();
};

document.getElementById("generateBtn").onclick = async () => {
  const res = await fetch("/generate", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      target1: f1,
      target2: f2
    })
  });

  const data = await res.json();
  document.getElementById("videoOut").src = data.output_url;
};
</script>

</body>
</html>
